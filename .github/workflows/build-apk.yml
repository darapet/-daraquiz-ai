name: Build DaraQuiz AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor Android
        run: |
          npm init -y
          npm install @capacitor/android

      - name: Fix capacitor.settings.gradle
        run: |
          cat > android/capacitor.settings.gradle << 'EOF'
          include ':capacitor-android'
          project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')
          EOF

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/. android/app/src/main/assets/public/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate debug keystore and print SHA-1
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "=== YOUR SHA-1 FINGERPRINT ==="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep SHA1

      - name: Fix missing capacitor-cordova-android-plugins
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main

          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
          ext {
            cdvMinSdkVersion = project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 24
            cdvPluginPostBuildExtras = []
            cordovaConfig = [:]
          }
          EOF

          cat > android/capacitor-cordova-android-plugins/build.gradle << 'EOF'
          ext {
              androidxAppCompatVersion = project.hasProperty('androidxAppCompatVersion') ? rootProject.ext.androidxAppCompatVersion : '1.7.1'
              cordovaAndroidVersion = project.hasProperty('cordovaAndroidVersion') ? rootProject.ext.cordovaAndroidVersion : '14.0.1'
          }
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.13.0'
              }
          }
          apply plugin: 'com.android.library'
          android {
              namespace = "capacitor.cordova.android.plugins"
              compileSdk = project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 36
              defaultConfig {
                  minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 24
                  targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 36
                  versionCode 1
                  versionName "1.0"
              }
              lintOptions {
                  abortOnError = false
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          repositories {
              google()
              mavenCentral()
              flatDir{ dirs 'src/main/libs', 'libs' }
          }
          dependencies {
              implementation fileTree(dir: 'src/main/libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
              implementation "org.apache.cordova:framework:$cordovaAndroidVersion"
          }
          apply from: "cordova.variables.gradle"
          for (def func : cdvPluginPostBuildExtras) { func() }
          EOF

          cat > android/capacitor-cordova-android-plugins/src/main/AndroidManifest.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
          xmlns:amazon="http://schemas.amazon.com/apk/res/android">
          <application></application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.14.3
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DaraQuizAI-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
